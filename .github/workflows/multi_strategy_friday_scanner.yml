name: Multi-Strategy Friday Evening Scanner

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-multi-scan:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository Source Code
      uses: actions/checkout@v4

    - name: Initialize Python Runtime Environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install Project Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install setuptools wheel
        pip install -r requirements.txt
        pip install pandas-ta-classic==0.3.15 --no-deps

    - name: Execute Multi-Strategy Quant Scanner
      env:
        TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: |
        python multi_strategy_scanner.py > run.log 2>&1
        status=$?
        if [ $status -ne 0 ]; then
          echo "Script failed. Committing error log."
          cp run.log error.log
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add error.log
          git commit -m "chore: save failure log [skip ci]"
          git push origin HEAD:refs/heads/debug-logs --force
          exit $status
        fi
