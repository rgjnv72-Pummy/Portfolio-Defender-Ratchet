name: Multi-Strategy Friday Evening Scanner

on:
  # Allow manual "Run workflow" button in the Actions tab for testing (schedule moved to Consolidated Pipeline)
  workflow_dispatch:

jobs:
  run-multi-scan:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository Source Code
      uses: actions/checkout@v4

    - name: Initialize Python Runtime Environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install Project Dependencies
      run: |
        python -m pip install --upgrade pip
        python -m pip install setuptools wheel
        python -m pip install -r requirements.txt
        python -m pip install pandas-ta-classic==0.3.15 --no-deps
        python -c "import sys; print('SYS PATH:', sys.path); import pandas_ta_classic; print('Import test inside install step succeeded!')"

    - name: Execute Multi-Strategy Quant Scanner
      env:
        TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: python multi_strategy_scanner.py
