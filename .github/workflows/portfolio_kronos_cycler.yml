name: Kronos Portfolio Friday Evening Scanner

on:
  schedule:
    # 01:15 PM UTC triggers at exactly 06:45 PM Indian Standard Time (IST) every Friday
    - cron: '15 13 * * 5'
  workflow_dispatch: # Enable manual trigger from GitHub UI

jobs:
  run-portfolio-scan:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository Source Code
      uses: actions/checkout@v4

    - name: Initialize Python Runtime Environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install Project Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install yfinance numpy pandas requests

    - name: Execute Portfolio Cycles Scanner
      env:
        TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: python portfolio_kronos_cycler.py
