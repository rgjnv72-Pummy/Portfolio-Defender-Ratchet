name: Kronos Friday Master Scan

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install yfinance pandas==1.5.3 numpy==1.26.4 tqdm
          # We decode the URL at runtime so GitHub cannot break it
          ENCODED_URL="Z2l0K2h0dHBzOi8vZ2l0aHViLmNvbS90d29waXJsbGMvcGFuZGFzLXRhLmdpdEBkZXZlbG9wbWVudA=="
          DECODED_URL=$(echo $ENCODED_URL | base64 --decode)
          pip install "$DECODED_URL"

      - name: Run scanner
        run: python master_scanner.py
