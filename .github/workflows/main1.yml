name: Kronos Friday Master Scan

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  run-script:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install yfinance pandas==1.5.3 numpy==1.26.4 tqdm
          # We encode the link so GitHub cannot cut it at the .com
          SAFE_LINK=$(echo "Z2l0K2h0dHBzOi8vZ2l0aHViLmNvbS90d29waXJsbGMvcGFuZGFzLXRhLmdpdEBkZXZlbG9wbWVudA==" | base64 --decode)
          pip install "$SAFE_LINK"

      - name: Execute Script
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python master_scanner.py
