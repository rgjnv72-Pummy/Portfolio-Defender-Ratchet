name: Kronos Friday Master Scan

on:
  schedule:
    # 10:30 UTC is 4:00 PM IST (Triggers every Friday afternoon)
    - cron: '30 10 * * 5'
  workflow_dispatch: # Keeps the manual 'Run workflow' button active on GitHub

jobs:
  run-script:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip' # Caches dependencies to speed up subsequent workflow runs

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install yfinance pandas numpy tqdm lxml requests pandas-ta nselib
          
      - name: Execute Master Scanner
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python master_scanner.py
