name: Kronos Friday Master Scan

on:
  schedule:
    # This runs every 10 minutes for testing
    - cron: '*/10 * * * *'
  workflow_dispatch: # Allows you to run it manually for testing

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install yfinance pandas numpy tqdm
          pip install git+https://github.com

      - name: Run scanner
        run: python master_scanner.py
