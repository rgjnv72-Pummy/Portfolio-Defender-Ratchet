name: Kronos Friday Master Scan

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install yfinance pandas==1.5.3 numpy==1.26.4 tqdm
          # Installing via standard PyPI to avoid URL errors
          pip install pandas-ta==0.3.14b

      - name: Run scanner
        run: python master_scanner.py
