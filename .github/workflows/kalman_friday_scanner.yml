name: Kalman Filter Friday Evening Scanner

on:
  # Enable manual triggering from GitHub Actions UI (schedule moved to Consolidated Pipeline)
  workflow_dispatch:

jobs:
  run-friday-scan:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository Source Code
      uses: actions/checkout@v4

    - name: Initialize Python Runtime Environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Project Dependencies
      run: |
        python -m pip install --upgrade pip
        python -m pip install setuptools wheel
        python -m pip install -r requirements.txt
        python -m pip install pandas-ta==0.3.14b0
        python -c "import sys; print('SYS PATH:', sys.path); import pandas_ta; print('Import test inside install step succeeded!')"

    - name: Execute Kalman Filter Scanner
      env:
        TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: python kalman_bullish_scanner.py
