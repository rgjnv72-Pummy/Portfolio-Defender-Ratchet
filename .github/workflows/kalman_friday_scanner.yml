name: Kalman Filter Friday Evening Scanner

on:
  schedule:
    # 01:10 PM UTC translates to exactly 06:40 PM IST (Indian Standard Time) on Fridays
    - cron: '10 13 * * 5'
  
  # Enable manual triggering from GitHub Actions UI
  workflow_dispatch:

jobs:
  run-friday-scan:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository Source Code
      uses: actions/checkout@v4

    - name: Initialize Python Runtime Environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip'

    - name: Install Project Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install setuptools wheel
        pip install -r requirements.txt
        pip install "pandas-ta @ git+https://github.com"

    - name: Execute Kalman Filter Scanner
      env:
        TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: python kalman_bullish_scanner.py
