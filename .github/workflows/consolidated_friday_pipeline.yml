name: Consolidated Friday Evening Quant Pipeline

on:
  schedule:
    # 01:10 PM UTC translates to exactly 06:40 PM IST (Indian Standard Time) on Fridays
    - cron: '10 13 * * 5'
  
  # Enable manual triggering from GitHub Actions UI
  workflow_dispatch:

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository Source Code
      uses: actions/checkout@v4

    - name: Initialize Python Runtime Environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip'

    - name: Install Project Dependencies
      run: |
        python -m pip install --upgrade pip
        python -m pip install setuptools wheel
        python -m pip install -r requirements.txt
        python -m pip install pandas-ta-classic==0.3.15 --no-deps

    - name: Run Unified Data Fetcher (Download & Cache)
      env:
        TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: python data_fetcher.py

    - name: Execute Multi-Strategy Quant Scanner
      env:
        TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: python multi_strategy_scanner.py

    - name: Execute Kalman Filter Scanner
      env:
        TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: python kalman_bullish_scanner.py

    - name: Execute ARIMA-GARCH Swing Scanner
      env:
        TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: python arima_garch_scanner.py

    - name: Execute 12-Point Quant Model Pipeline
      env:
        TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: python quant_pipeline.py
