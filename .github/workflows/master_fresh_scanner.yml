name: Master Fresh Trades Scanner

on:
  workflow_dispatch:

jobs:
  run-fresh-scanner:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository Source Code
      uses: actions/checkout@v4

    - name: Initialize Python Runtime Environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install Project Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install yfinance numpy pandas tqdm requests urllib3

    - name: Execute Master Fresh Scanner
      run: python master_fresh_scanner.py

    - name: Execute Fresh Trades Watchdog Alert check
      env:
        TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: python fresh_trades_watchdog.py
