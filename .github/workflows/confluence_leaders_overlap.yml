name: Confluence & Leaders Overlap Friday Evening Scanner

on:
  schedule:
    # 02:15 PM UTC triggers at exactly 07:45 PM Indian Standard Time (IST) every Friday
    # This runs after nse500_leaders_scanner (runs at 07:15 PM IST)
    - cron: '15 14 * * 5'
  workflow_dispatch: # Enable manual trigger from GitHub UI

jobs:
  run-overlap-scan:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository Source Code
      uses: actions/checkout@v4

    - name: Initialize Python Runtime Environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install Project Dependencies
      run: |
        python -m pip install --upgrade pip
        python -m pip install setuptools wheel
        python -m pip install -r requirements.txt
        python -m pip install pandas-ta-classic==0.3.15 statsmodels --no-deps

    - name: Execute Overlap Scanner
      env:
        TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: python confluence_leaders_overlap.py
