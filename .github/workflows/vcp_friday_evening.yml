name: VCP Friday Evening Scanner

on:
  schedule:
    # 01:00 PM UTC translates to exactly 06:30 PM IST (Indian Standard Time)
    # The '5' declaration restricts this script to run ONLY on Fridays
    - cron: '0 13 * * 5'
  
  # Adds a manual "Run workflow" button in GitHub so you can test it anytime
  workflow_dispatch:

jobs:
  run-friday-scan:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository Source Code
      uses: actions/checkout@v4

    - name: Initialize Python Runtime Environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install Project Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    # Triggers your VCP script and injects your secure Telegram environment credentials
    - name: Execute Volatility Contraction Scanner
      env:
        TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: python vcp_scanner.py
