name: Quant Friday Evening Multi-Bagger Scanner

on:
  schedule:
    # 02:15 PM UTC translates to exactly 07:45 PM IST on Fridays
    - cron: '15 14 * * 5'
  
  # Allow manual triggering from GitHub Actions UI
  workflow_dispatch:

jobs:
  run-multibagger-scan:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository Source Code
      uses: actions/checkout@v4

    - name: Initialize Python Runtime Environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install Project Dependencies
      run: |
        python -m pip install --upgrade pip
        python -m pip install setuptools wheel
        python -m pip install -r requirements.txt

    - name: Run Unified Data Fetcher (Download & Cache)
      env:
        TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: python data_fetcher.py

    - name: Execute Multi-Bagger Quant Scanner
      env:
        TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: python multibagger_scanner.py
