name: VSA-HMM Friday Evening Scanner

on:
  schedule:
    # 01:50 PM UTC translates to exactly 07:20 PM IST (Indian Standard Time) on Fridays
    - cron: '50 13 * * 5'
  
  # Enable manual triggering from GitHub Actions UI
  workflow_dispatch:

jobs:
  run-friday-scan:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository Source Code
      uses: actions/checkout@v4

    - name: Initialize Python Runtime Environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install Project Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Execute VSA HMM Scanner
      env:
        TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: python vsa_hmm_regime_scanner.py
