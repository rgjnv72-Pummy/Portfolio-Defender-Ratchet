name: Daily Guardian
on:
  schedule:
    # 10:10 PM IST is 16:40 UTC
    - cron: '40 16 * * 1-5'
  workflow_dispatch: # Keeps the manual 'Run' button available

jobs:
  run-script:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          
      - name: Install dependencies
        # Added pandas-ta which is required for your code's logic to execute
        run: pip install yfinance pandas numpy pandas-ta 
        
      - name: Execute Script
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python guardian.py
